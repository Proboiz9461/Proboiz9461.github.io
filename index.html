<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Energy Dashboard — Shaurya Chauhan</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0b0f1e;
    }

    /* ── Animated mesh background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255,140,60,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 70%, rgba(80,140,255,0.16) 0%, transparent 55%),
        radial-gradient(ellipse at 55% 10%, rgba(160,100,255,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 10% 80%, rgba(60,200,140,0.10) 0%, transparent 50%),
        linear-gradient(160deg, #0b0f1e 0%, #121830 50%, #0e1520 100%);
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      100% { filter: hue-rotate(25deg) brightness(1.08); }
    }

    /* Floating orbs */
    .orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      animation: float linear infinite;
    }
    .orb1 {
      width: 420px; height: 420px;
      top: -180px; left: -160px;
      background: radial-gradient(circle, rgba(255,130,50,0.13) 0%, transparent 70%);
      animation-duration: 18s;
    }
    .orb2 {
      width: 340px; height: 340px;
      bottom: -140px; right: -120px;
      background: radial-gradient(circle, rgba(80,150,255,0.14) 0%, transparent 70%);
      animation-duration: 22s; animation-direction: reverse;
    }
    .orb3 {
      width: 220px; height: 220px;
      top: 50%; left: 70%;
      background: radial-gradient(circle, rgba(160,100,255,0.10) 0%, transparent 70%);
      animation-duration: 15s;
    }

    @keyframes float {
      0%   { transform: translate(0,0) scale(1); }
      33%  { transform: translate(30px,-25px) scale(1.04); }
      66%  { transform: translate(-20px,20px) scale(0.97); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* Noise grain overlay */
    .grain {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      width: min(480px, 92vw);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      padding: 3rem 2.5rem 2.5rem;
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06) inset,
        0 32px 80px rgba(0,0,0,0.5),
        0 4px 20px rgba(255,140,60,0.08);
      animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* top shine line */
    .card::before {
      content: ''; position: absolute; top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      border-radius: 50%;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 2.5rem; }

    .logo-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      width: 64px; height: 64px; border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 28px; margin-bottom: 1.1rem;
      box-shadow: 0 4px 20px rgba(255,140,60,0.15), 0 0 0 1px rgba(255,255,255,0.05) inset;
      animation: logoGlow 3s ease-in-out infinite alternate;
    }

    @keyframes logoGlow {
      from { box-shadow: 0 4px 20px rgba(255,140,60,0.12), 0 0 0 1px rgba(255,255,255,0.05) inset; }
      to   { box-shadow: 0 4px 32px rgba(255,140,60,0.28), 0 0 0 1px rgba(255,255,255,0.1) inset; }
    }

    .eyebrow {
      font-size: 10px; letter-spacing: 2.8px; text-transform: uppercase;
      color: rgba(255,180,100,0.7); font-weight: 500; margin-bottom: 8px;
    }

    .title {
      font-family: 'DM Serif Display', serif;
      font-size: 30px; color: rgba(255,245,235,0.95);
      line-height: 1.15; margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px; color: rgba(255,255,255,0.38);
      font-weight: 300; line-height: 1.55;
    }

    /* ── Divider ── */
    .divider {
      height: 1px; margin: 0 0 2rem;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    }

    /* ── Buttons ── */
    .btn-group { display: flex; flex-direction: column; gap: 14px; }

    .glass-btn {
      display: flex; align-items: center; gap: 16px;
      padding: 1.05rem 1.4rem;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(255,255,255,0.055);
      color: rgba(255,245,235,0.9);
      text-decoration: none;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.22s ease,
                  border-color 0.22s ease,
                  background 0.22s ease;
      animation: btnIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }

    .glass-btn:nth-child(1) { animation-delay: 0.15s; }
    .glass-btn:nth-child(2) { animation-delay: 0.28s; }

    @keyframes btnIn {
      from { opacity: 0; transform: translateX(-18px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* top shine */
    .glass-btn::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      border-radius: 18px 18px 0 0;
      transition: opacity 0.2s;
    }

    /* hover glow sweep */
    .glass-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.06) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.55s ease;
    }

    .glass-btn:hover::after { transform: translateX(100%); }

    .glass-btn:hover {
      transform: translateY(-3px) scale(1.015);
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.22);
    }

    .glass-btn:active {
      transform: translateY(0px) scale(0.99);
    }

    /* Orange accent button */
    .glass-btn.btn-orange {
      border-color: rgba(255,140,60,0.3);
      background: rgba(255,130,50,0.09);
    }
    .glass-btn.btn-orange:hover {
      border-color: rgba(255,150,70,0.5);
      background: rgba(255,130,50,0.16);
      box-shadow: 0 8px 28px rgba(255,120,40,0.22), 0 2px 8px rgba(0,0,0,0.3);
    }
    .glass-btn.btn-orange .btn-icon {
      background: rgba(255,140,60,0.2);
      border-color: rgba(255,140,60,0.35);
      box-shadow: 0 0 16px rgba(255,130,50,0.25);
    }

    /* Blue accent button */
    .glass-btn.btn-blue {
      border-color: rgba(80,160,255,0.3);
      background: rgba(70,150,255,0.08);
    }
    .glass-btn.btn-blue:hover {
      border-color: rgba(100,170,255,0.5);
      background: rgba(70,150,255,0.15);
      box-shadow: 0 8px 28px rgba(60,130,255,0.20), 0 2px 8px rgba(0,0,0,0.3);
    }
    .glass-btn.btn-blue .btn-icon {
      background: rgba(80,160,255,0.18);
      border-color: rgba(80,160,255,0.32);
      box-shadow: 0 0 16px rgba(70,150,255,0.22);
    }

    .btn-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }

    .glass-btn:hover .btn-icon { transform: scale(1.12) rotate(-4deg); }

    .btn-text { flex: 1; }
    .btn-label {
      font-family: 'DM Serif Display', serif;
      font-size: 17px; color: rgba(255,245,235,0.95);
      display: block; line-height: 1.2; margin-bottom: 2px;
    }
    .btn-desc {
      font-size: 11.5px; color: rgba(255,255,255,0.38);
      font-weight: 300; display: block;
    }

    .btn-arrow {
      font-size: 18px; color: rgba(255,255,255,0.25);
      transition: transform 0.22s ease, color 0.22s ease;
      flex-shrink: 0;
    }
    .glass-btn:hover .btn-arrow {
      transform: translateX(4px);
      color: rgba(255,255,255,0.6);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 2rem; text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .footer-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg,#e8a870,#d07840);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif; font-size: 10px; color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .footer-text {
      font-size: 10px; color: rgba(255,255,255,0.28);
      letter-spacing: 0.3px;
    }
    .footer-text strong {
      color: rgba(255,220,170,0.55); font-weight: 500;
    }

    /* ── Particles ── */
    .particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.45);
      animation: rise linear infinite;
    }

    @keyframes rise {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 1; }
      90%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1.2); }
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="grain"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="header">
    <div class="logo-wrap">⚡</div>
    <p class="eyebrow">Energy Dashboard</p>
    <h1 class="title">Power Usage<br>Explorer</h1>
    <p class="subtitle">Explore monthly energy consumption across<br>devices and Indian states</p>
  </div>

  <div class="divider"></div>

  <div class="btn-group">

    <a href="home.html" class="glass-btn btn-orange">
      <div class="btn-icon">🏠</div>
      <div class="btn-text">
        <span class="btn-label">Device Energy Usage</span>
        <span class="btn-desc">Monthly kWh & INR cost · All device categories</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>

    <a href="country.html" class="glass-btn btn-blue">
      <div class="btn-icon">🇮🇳</div>
      <div class="btn-text">
        <span class="btn-label">India State-Wise Rates</span>
        <span class="btn-desc">27 states · Tariff comparison · Device cost by state</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>

  </div>

  <div class="footer">
    <div class="footer-avatar">SC</div>
    <p class="footer-text">Made by <strong>Shaurya Chauhan</strong></p>
  </div>
</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      bottom: -10px;
      animation-duration: ${Math.random() * 14 + 8}s;
      animation-delay: ${Math.random() * 12}s;
      opacity: ${Math.random() * 0.5 + 0.1};
    `;
    container.appendChild(p);
  }
</script>
</body>
</html>
